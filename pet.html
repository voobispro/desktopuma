<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: transparent;
    -webkit-app-region: drag; /* makes the whole window draggable */
  }

  #character {
    width: 150px;
    user-select: none;
    pointer-events: none; /* prevents accidental drag/drop */
    animation: dance 0.6s infinite alternate ease-in-out;
  }

  @keyframes dance {
    0% { transform: rotate(-5deg) translateY(0px); }
    100% { transform: rotate(5deg) translateY(-10px); }
  }
</style>
</head>
<body>

<img id="character">

<script>
const { ipcRenderer } = require("electron");
const char = document.getElementById("character");

ipcRenderer.on("set-image", (event, imagePath) => {
  char.src = imagePath;
});
</script>

</body>
</html>
